<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="240" y1="80" x2="1360" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#143353"/>
      <stop offset="0.55" stop-color="#0B2038"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(310 180) rotate(29) scale(410 250)">
      <stop stop-color="#8BE7D2" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8BE7D2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1220 170) rotate(152) scale(320 220)">
      <stop stop-color="#F2C57C" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#F2C57C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" rx="44" fill="url(#bg)"/>
  <rect width="1600" height="1000" rx="44" fill="url(#glowA)"/>
  <rect width="1600" height="1000" rx="44" fill="url(#glowB)"/>
  <text x="120" y="132" fill="#F2C57C" font-size="34" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" letter-spacing="8">RECHARGE GATE</text>
  <text x="120" y="225" fill="#F5F7FA" font-size="72" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-weight="700">5가지 1분 리듬 운동</text>
  <text x="120" y="286" fill="#A9BCD0" font-size="32" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif">몸을 다시 깨우고 활력을 되찾는 작은 리듬</text>

  <g>
    <rect x="120" y="360" width="640" height="118" rx="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
    <text x="168" y="432" fill="#F5F7FA" font-size="40" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-weight="600">1. 발뒤꿈치 들어 올리기</text>
  </g>
  <g>
    <rect x="840" y="360" width="640" height="118" rx="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
    <text x="888" y="432" fill="#F5F7FA" font-size="40" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-weight="600">2. 스쿼트</text>
  </g>
  <g>
    <rect x="120" y="520" width="640" height="118" rx="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
    <text x="168" y="592" fill="#F5F7FA" font-size="40" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-weight="600">3. 리듬 워킹</text>
  </g>
  <g>
    <rect x="840" y="520" width="640" height="118" rx="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
    <text x="888" y="592" fill="#F5F7FA" font-size="40" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-weight="600">4. 가슴 열기</text>
  </g>
  <g>
    <rect x="120" y="680" width="1360" height="118" rx="28" fill="rgba(127,255,212,0.08)" stroke="rgba(127,255,212,0.18)"/>
